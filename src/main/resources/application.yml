spring:
  application:
    name: messenger-aggregator
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/aggregator
    username: aggregator
    password: aggregator
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate   # схема создаётся через Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true

  redis:
    host: localhost
    port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: true

logging:
  level:
    root: INFO
    ru.aggregator: DEBUG
